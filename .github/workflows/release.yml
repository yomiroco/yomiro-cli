name: cli-release

# This workflow is authored in the Yomiro monorepo but is intended to run
# only in the public mirror repo `yomiroco/yomiro-cli`. The `if:` guard on
# the job makes it a no-op when triggered anywhere else, so a stray
# `git push origin v0.0.1` from the monorepo won't kick off a broken
# release pipeline.
on:
  push:
    tags:
      - 'v*'   # tag scheme: vX.Y.Z (semver) in the public repo
  workflow_dispatch: {}

permissions:
  contents: write
  packages: write
  id-token: write   # cosign keyless signing

jobs:
  release:
    if: github.repository == 'yomiroco/yomiro-cli'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: sigstore/cosign-installer@v3
      - uses: anchore/sbom-action/download-syft@v0

      - name: Run goreleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: latest
          args: release --clean
          workdir: .
        env:
          GITHUB_TOKEN:        ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_TOKEN:  ${{ secrets.HOMEBREW_TAP_TOKEN }}
